<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="c">
      <circle cx="16" cy="16" r="14.5"/>
    </clipPath>
    <radialGradient id="g" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#D94030"/>
      <stop offset="100%" stop-color="#9B1C10"/>
    </radialGradient>
  </defs>

  <!-- Ball body with gradient for depth -->
  <circle cx="16" cy="16" r="15" fill="url(#g)"/>
  <circle cx="16" cy="16" r="15" fill="none" stroke="#7A1508" stroke-width="1"/>

  <!-- Gloss highlight -->
  <ellipse cx="11" cy="10" rx="5" ry="3" fill="white" opacity="0.22" transform="rotate(-30 11 10)"/>

  <!-- Seam lines clipped to ball -->
  <g clip-path="url(#c)">
    <!-- Top seam line -->
    <path d="M 1 13.5 C 8 11.5, 24 11.5, 31 13.5"
      fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.92"/>
    <!-- Bottom seam line (parallel) -->
    <path d="M 1 18.5 C 8 16.5, 24 16.5, 31 18.5"
      fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.92"/>
    <!-- Stitching on top seam -->
    <path d="M 1 13.5 C 8 11.5, 24 11.5, 31 13.5"
      fill="none" stroke="rgba(255,210,195,0.55)" stroke-width="1" stroke-dasharray="3 2.2" stroke-linecap="round"/>
    <!-- Stitching on bottom seam -->
    <path d="M 1 18.5 C 8 16.5, 24 16.5, 31 18.5"
      fill="none" stroke="rgba(255,210,195,0.55)" stroke-width="1" stroke-dasharray="3 2.2" stroke-linecap="round"/>
  </g>
</svg>
